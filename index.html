<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coloretto</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>* { box-sizing: border-box; margin: 0; padding: 0; }</style>
</head>
<body style="background:#0f0f1a">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const COLORS = ["🔴","🟡","🟢","🔵","🟠","🟣","⚫"];
const COLOR_BG = ["#e74c3c","#f1c40f","#2ecc71","#3498db","#e67e22","#9b59b6","#34495e"];
const COLOR_LIGHT = ["#fadbd8","#fef9e7","#d5f5e3","#d6eaf8","#fdebd0","#e8daef","#d5d8dc"];
const SCORING = [0,1,3,6,10,15,21,21];

function buildDeck(numColors) {
  const deck = [];
  for (let col = 0; col < numColors; col++) for (let i = 0; i < 9; i++) deck.push({ type:"color", color:col });
  for (let i = 0; i < 3; i++) deck.push({ type:"joker" });
  for (let i = 0; i < 3; i++) deck.push({ type:"plus2" });
  for (let i = deck.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
  const endPos = Math.max(0, deck.length-15);
  deck.splice(endPos, 0, { type:"end" });
  return deck;
}

function getScore(counts, jokers=0) {
  const c = [...counts];
  for (let j = 0; j < jokers; j++) {
    const sorted = c.map((v,i)=>({v,i})).sort((a,b)=>b.v-a.v);
    let bestGain=-Infinity, bestIdx=sorted[0].i;
    sorted.slice(0,3).forEach(({v,i})=>{ const gain=SCORING[Math.min(v+1,6)]-SCORING[Math.min(v,6)]; if(gain>bestGain){bestGain=gain;bestIdx=i;} });
    c[bestIdx]++;
  }
  const sorted=[...c].sort((a,b)=>b-a);
  let score=0;
  sorted.forEach((v,i)=>{ const s=SCORING[Math.min(v,6)]; score+=i<3?s:-s; });
  return score;
}

function countColors(hand) {
  const counts=Array(7).fill(0);
  hand.forEach(c=>{ if(c.type==="color") counts[c.color]++; });
  return counts;
}

function countJokers(hand) { return hand.filter(c=>c.type==="joker").length; }

function getGameConfig(n) {
  if(n===2) return {numColors:5,rowCount:3,rowMaxCards:[1,2,3]};
  if(n===3) return {numColors:6,rowCount:3,rowMaxCards:[3,3,3]};
  if(n===4) return {numColors:7,rowCount:4,rowMaxCards:[3,3,3,3]};
  return           {numColors:7,rowCount:5,rowMaxCards:[3,3,3,3,3]};
}

function setupGame(players) {
  const n=players.length;
  const {numColors,rowCount,rowMaxCards}=getGameConfig(n);
  let deck=buildDeck(numColors);
  const usedColors=new Set();
  const startingHands=players.map(()=>{
    const idx=deck.findIndex(card=>card.type==="color"&&!usedColors.has(card.color));
    const card=deck[idx]; usedColors.add(card.color);
    deck=deck.filter((_,i)=>i!==idx);
    return [card];
  });
  return {
    players:players.map((p,i)=>({...p,hand:startingHands[i],bonus:0})),
    deck, numColors, rowMaxCards,
    rows:Array(rowCount).fill(null).map(()=>[]),
    rowTaken:Array(rowCount).fill(false),
    playersDone:Array(n).fill(false),
    currentPlayer:0, phase:"playing", pendingCard:null, message:"", log:[],
  };
}

function applyDrawCard(g) {
  if(g.deck.length===0||g.phase!=="playing"||g.pendingCard) return g;
  let deck=[...g.deck];
  const card=deck.shift();
  if(card.type==="end") {
    if(deck.length===0) return {...g,deck,lastRound:true,message:"🔔 ラストラウンド！（デッキ切れ）"};
    const next=deck.shift();
    return {...g,deck,lastRound:true,pendingCard:next,message:"🔔 ラストラウンド！終了カードが引かれました。どの列にカードを置きますか？"};
  }
  return {...g,deck,pendingCard:card,message:"どの列にカードを置きますか？"};
}

function applyPlaceCard(g,rowIndex) {
  if(!g.pendingCard||g.phase!=="playing") return g;
  const maxCards=(g.rowMaxCards||[])[rowIndex]??3;
  if(g.rowTaken[rowIndex]||g.rows[rowIndex].length>=maxCards) return g;
  const rows=g.rows.map((r,i)=>i===rowIndex?[...r,g.pendingCard]:[...r]);
  const log=[`${g.players[g.currentPlayer].name} が列${rowIndex+1}にカードを置いた`,...g.log.slice(0,9)];
  const playersDone=g.playersDone;
  let nextPlayer=(g.currentPlayer+1)%g.players.length,safety=0;
  while(playersDone[nextPlayer]&&safety<g.players.length){nextPlayer=(nextPlayer+1)%g.players.length;safety++;}
  const allRowsUnavailable=rows.every((r,i)=>g.rowTaken[i]||r.length>=(g.rowMaxCards?.[i]??3));
  const message=allRowsUnavailable?"全列が満杯です。列を取ってください。":"";
  return {...g,rows,pendingCard:null,currentPlayer:nextPlayer,log,message,phase:g.phase};
}

function applyTakeRow(g,rowIndex) {
  if(g.phase!=="playing") return g;
  if(g.rowTaken[rowIndex]||g.rows[rowIndex].length===0) return g;
  const rowTaken=[...g.rowTaken]; rowTaken[rowIndex]=true;
  const takenCards=[...g.rows[rowIndex]];
  const rows=g.rows.map((r,i)=>i===rowIndex?[]:[...r]);
  const playersDone=[...g.playersDone]; playersDone[g.currentPlayer]=true;
  const players=g.players.map((p,i)=>{
    if(i!==g.currentPlayer) return p;
    let bonus=p.bonus; const hand=[...p.hand];
    takenCards.forEach(c=>{ if(c.type==="plus2") bonus+=2; else hand.push(c); });
    return {...p,hand,bonus};
  });
  const log=[`${g.players[g.currentPlayer].name} が列${rowIndex+1}を取得（ラウンド終了）`,...g.log.slice(0,9)];
  const allDone=playersDone.every(Boolean);
  let phase=g.phase, message="";
  if(allDone) {
    if(g.lastRound||g.deck.length===0) return {...g,players,rows,rowTaken,playersDone,phase:"ended",log,message:"ゲーム終了！"};
    const nextFirst=g.currentPlayer;
    return {...g,players,deck:g.deck,rows:g.rows.map(()=>[]),rowTaken:g.rows.map(()=>false),playersDone:g.players.map(()=>false),currentPlayer:nextFirst,phase,log,message:`ラウンド終了！${g.players[nextFirst].name} から次のラウンド開始`};
  }
  let nextPlayer=(g.currentPlayer+1)%g.players.length,safety=0;
  while(playersDone[nextPlayer]&&safety<g.players.length){nextPlayer=(nextPlayer+1)%g.players.length;safety++;}
  return {...g,players,rows,rowTaken,playersDone,currentPlayer:nextPlayer,phase,log,message};
}

function cpuDecide(g,playerIndex) {
  const player=g.players[playerIndex];
  const counts=countColors(player.hand);
  const myJokers=countJokers(player.hand);
  const deckRatio=g.lastRound?0:g.deck.length/67;

  function scoreGainForRow(row) {
    const newCounts=[...counts]; let bonus=0,newJokers=myJokers;
    for(const card of row) {
      if(card.type==="plus2"){bonus+=2;continue;}
      if(card.type==="joker"){newJokers++;continue;}
      newCounts[card.color]++;
    }
    const before=getScore(counts,myJokers);
    const after=getScore(newCounts,newJokers)+bonus;
    const gain=after-before;
    const totalColorsAfter=newCounts.filter(v=>v>0).length;
    return gain-Math.max(0,totalColorsAfter-3)*2;
  }

  const availableRows=g.rows.map((row,i)=>({row,i})).filter(({i})=>!g.rowTaken[i]&&g.rows[i].length>0);
  if(availableRows.length===0) return {action:"draw"};

  const scoredRows=availableRows.map(({row,i})=>({i,gain:scoreGainForRow(row),len:row.length})).sort((a,b)=>b.gain-a.gain);
  const bestRow=scoredRows[0];

  const allRowsFull=g.rows.every((r,i)=>g.rowTaken[i]||r.length>=(g.rowMaxCards?.[i]??3));
  if(allRowsFull||g.lastRound) return {action:"take",rowIndex:bestRow.i};

  const activePlayers=g.players.filter((_,i)=>!g.playersDone[i]).length;
  const stealProb=Math.min(0.4,(activePlayers-1)*0.12);
  const stealLoss=bestRow.gain*stealProb;
  const sortedCounts=[...counts].sort((a,b)=>b-a);
  const top3Sum=sortedCounts.slice(0,3).reduce((s,v)=>s+v,0);
  const usefulRatio=Math.max(0.15,Math.min(0.5,(27-top3Sum*2)/63));
  const expectedAddGain=usefulRatio*2.5;
  const waitValue=expectedAddGain-stealLoss;
  const lateBonus=deckRatio<0.3?2:deckRatio<0.5?0.8:0;

  // 列の中で自分の持ち色（すでに持っているカードの色）と一致する枚数
  const bestRowCards = g.rows[bestRow.i] || [];
  const matchingCards = bestRowCards.filter(card =>
    card.type === "color" && counts[card.color] > 0
  ).length;
  const allCardsMatch = matchingCards === bestRow.len && bestRow.len > 0;

  // 序盤補正：デッキが多く残っているほど待つことを強制
  // 例外：列の全カードがすでに持っている色なら序盤でも取ってよい
  let earlyGamePenalty = 0;
  if (!allCardsMatch) {
    if (deckRatio > 0.7) earlyGamePenalty = 6;       // 序盤：かなり待つ
    else if (deckRatio > 0.5) earlyGamePenalty = 3;  // 中盤前半：やや待つ
    else if (deckRatio > 0.35) earlyGamePenalty = 1; // 中盤後半：少し待つ
  }

  let takeThreshold;
  if(bestRow.len>=3) takeThreshold=1+earlyGamePenalty*0.3; // 3枚はほぼ取る
  else if(bestRow.len===2) takeThreshold=waitValue+1.5-lateBonus+earlyGamePenalty;
  else takeThreshold=waitValue+4.5-lateBonus+earlyGamePenalty;

  if(bestRow.gain>=takeThreshold) return {action:"take",rowIndex:bestRow.i};
  return {action:"draw"};
}

function cpuChoosePlaceRow(g) {
  const available=g.rows.map((row,i)=>({row,i})).filter(({i})=>!g.rowTaken[i]&&g.rows[i].length<(g.rowMaxCards?.[i]??3));
  if(available.length===0) return null;
  const card=g.pendingCard;
  return available.map(({i,row})=>{
    let s=row.length*1.5;
    const rowColors=new Set(row.filter(c=>c.type==="color").map(c=>c.color));
    if(card.type==="color"&&rowColors.has(card.color)) s-=2;
    return {i,s};
  }).sort((a,b)=>a.s-b.s)[0].i;
}

function CardDisplay({card,small}) {
  const size=small?32:48;
  let bg="#fff",label="";
  if(card.type==="color"){bg=COLOR_BG[card.color];label=COLORS[card.color];}
  else if(card.type==="joker"){bg="linear-gradient(135deg,#f093fb,#f5576c,#4facfe,#43e97b)";label="🌈";}
  else{bg="#2d3436";label="+2";}
  return <div style={{width:size,height:size,borderRadius:8,background:bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:small?16:24,boxShadow:"0 2px 8px rgba(0,0,0,0.2)",flexShrink:0,border:"2px solid rgba(255,255,255,0.4)",color:card.type==="plus2"?"#f1c40f":"#fff",fontWeight:"bold"}}>{label}</div>;
}

function RowDisplay({row,rowIndex,canTake,canPlace,onRowClick,isActive,maxCards=3}) {
  const clickable=canTake||canPlace;
  const border=canPlace?"#4facfe":canTake?"#f1c40f":"transparent";
  const glow=canPlace?"rgba(79,172,254,0.35)":canTake?"rgba(241,196,15,0.35)":"none";
  return (
    <div onClick={clickable?()=>onRowClick(rowIndex):undefined} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",background:isActive?"rgba(255,255,255,0.07)":"rgba(255,255,255,0.02)",borderRadius:12,border:`2px solid ${border}`,cursor:clickable?"pointer":"default",minHeight:58,transition:"all 0.18s",transform:clickable?"scale(1.02)":"scale(1)",boxShadow:clickable?`0 0 14px ${glow}`:"none"}}>
      <span style={{color:"#444",fontSize:13,width:22,flexShrink:0}}>R{rowIndex+1}</span>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",flex:1}}>
        {row.length===0?<span style={{color:"#333",fontSize:12}}>（空）</span>:row.map((card,i)=><CardDisplay key={i} card={card} small/>)}
      </div>
      {canPlace&&<span style={{color:"#4facfe",fontWeight:"bold",fontSize:12,flexShrink:0}}>📥 置く</span>}
      {canTake&&<span style={{color:"#f1c40f",fontWeight:"bold",fontSize:12,flexShrink:0}}>✋ 取る</span>}
      {maxCards<3&&<span style={{color:"#555",fontSize:11,flexShrink:0}}>最大{maxCards}枚</span>}
    </div>
  );
}

function PlayerPanel({player,isCurrent,isDone}) {
  const counts=countColors(player.hand);
  const jokers=countJokers(player.hand);
  const score=getScore(counts,jokers)+player.bonus;
  return (
    <div style={{background:isCurrent?"rgba(241,196,15,0.1)":isDone?"rgba(255,255,255,0.02)":"rgba(255,255,255,0.05)",border:isCurrent?"2px solid #f1c40f":isDone?"2px solid rgba(255,255,255,0.04)":"2px solid rgba(255,255,255,0.09)",borderRadius:12,padding:"10px 14px",opacity:isDone?0.55:1,transition:"all 0.25s"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontWeight:"bold",fontSize:14,color:isCurrent?"#f1c40f":"#ddd"}}>
          {isCurrent?"▶ ":""}{player.isCPU?"🤖 ":"👤 "}{player.name}
          {isDone&&<span style={{fontSize:10,color:"#555",marginLeft:6}}>✓ 終了</span>}
        </span>
        <span style={{fontSize:18,fontWeight:"bold",color:"#f1c40f"}}>{score}点</span>
      </div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
        {counts.map((cnt,c)=>cnt===0?null:(
          <div key={c} style={{display:"flex",alignItems:"center",gap:2,background:COLOR_LIGHT[c],borderRadius:7,padding:"2px 7px"}}>
            <span style={{fontSize:12}}>{COLORS[c]}</span>
            <span style={{fontSize:12,fontWeight:"bold",color:COLOR_BG[c]}}>×{cnt}</span>
          </div>
        ))}
        {jokers>0&&<div style={{background:"linear-gradient(135deg,#f093fb,#4facfe)",borderRadius:7,padding:"2px 7px",color:"#fff",fontSize:12}}>🌈×{jokers}</div>}
        {player.bonus>0&&<div style={{background:"#2d3436",borderRadius:7,padding:"2px 7px",color:"#f1c40f",fontSize:12}}>+{player.bonus}</div>}
      </div>
    </div>
  );
}

function App() {
  const [screen,setScreen]=useState("setup");
  const [players,setPlayers]=useState([
    {name:"プレイヤー1",isCPU:false},
    {name:"CPU 1",isCPU:true},
    {name:"CPU 2",isCPU:true},
  ]);
  const [game,setGame]=useState(null);
  const cpuTimerRef=useRef(null);

  function startGame(){setGame(setupGame(players));setScreen("game");}
  function updatePlayer(i,field,value){setPlayers(ps=>ps.map((p,j)=>j===i?{...p,[field]:value}:p));}
  function addPlayer(){if(players.length<5){const n=players.length+1;setPlayers([...players,{name:`CPU ${n-1}`,isCPU:true}]);}}
  function removePlayer(i){if(players.length>2)setPlayers(players.filter((_,j)=>j!==i));}

  const doDrawCard=useCallback(()=>setGame(g=>applyDrawCard(g)),[]);
  const doPlaceCard=useCallback((ri)=>setGame(g=>applyPlaceCard(g,ri)),[]);
  const doTakeRow=useCallback((ri)=>setGame(g=>applyTakeRow(g,ri)),[]);

  useEffect(()=>{
    if(!game||game.phase!=="playing") return;
    const current=game.players[game.currentPlayer];
    if(!current.isCPU) return;
    const playersDone=game.playersDone||[];
    if(playersDone[game.currentPlayer]) return;
    const delay=game.pendingCard?600:900;
    cpuTimerRef.current=setTimeout(()=>{
      setGame(g=>{
        const cur=g.players[g.currentPlayer];
        if(!cur?.isCPU) return g;
        const done=g.playersDone||[];
        if(done[g.currentPlayer]) return g;
        if(g.pendingCard){const ri=cpuChoosePlaceRow(g);if(ri==null)return g;return applyPlaceCard(g,ri);}
        const decision=cpuDecide(g,g.currentPlayer);
        if(decision.action==="take"){
          const available=g.rows.map((r,i)=>({r,i})).filter(({r,i})=>!g.rowTaken[i]&&r.length>0);
          if(available.length===0) return g;
          return applyTakeRow(g,decision.rowIndex??available[0].i);
        }
        return applyDrawCard(g);
      });
    },delay);
    return ()=>clearTimeout(cpuTimerRef.current);
  },[game]);

  if(screen==="setup") return (
    <div style={{minHeight:"100vh",background:"#0f0f1a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"'Segoe UI',sans-serif",padding:20}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:48,marginBottom:6}}>🎨</div>
        <h1 style={{fontSize:38,fontWeight:900,margin:0,background:"linear-gradient(135deg,#f093fb,#f5576c,#4facfe,#43e97b,#f1c40f)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Coloretto</h1>
        <p style={{color:"#666",margin:"6px 0 0",fontSize:13}}>コロレッテ — カードゲーム</p>
      </div>
      <div style={{background:"rgba(255,255,255,0.05)",borderRadius:18,padding:24,width:"100%",maxWidth:420,border:"1px solid rgba(255,255,255,0.09)"}}>
        <h3 style={{color:"#aaa",margin:"0 0 14px",fontSize:14,letterSpacing:1,textTransform:"uppercase"}}>プレイヤー設定</h3>
        {players.map((p,i)=>(
          <div key={i} style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
            <button onClick={()=>updatePlayer(i,"isCPU",!p.isCPU)} style={{flexShrink:0,width:38,height:38,borderRadius:10,border:"none",background:p.isCPU?"rgba(79,172,254,0.25)":"rgba(255,255,255,0.08)",color:p.isCPU?"#4facfe":"#888",cursor:"pointer",fontSize:18}}>
              {p.isCPU?"🤖":"👤"}
            </button>
            <input value={p.name} onChange={e=>updatePlayer(i,"name",e.target.value)} style={{flex:1,padding:"9px 12px",borderRadius:10,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.07)",color:"#fff",fontSize:14,outline:"none"}}/>
            {players.length>2&&<button onClick={()=>removePlayer(i)} style={{flexShrink:0,width:34,height:34,background:"rgba(231,76,60,0.2)",border:"none",borderRadius:9,color:"#e74c3c",cursor:"pointer",fontSize:16}}>×</button>}
          </div>
        ))}
        {players.length<5&&<button onClick={addPlayer} style={{width:"100%",padding:"8px",background:"rgba(255,255,255,0.04)",border:"1px dashed rgba(255,255,255,0.15)",borderRadius:10,color:"#666",cursor:"pointer",fontSize:13,marginBottom:14}}>＋ プレイヤーを追加</button>}
        <div style={{fontSize:12,color:"#555",marginBottom:14,textAlign:"center"}}>🤖 = CPU　👤 = 人間（タップで切替）</div>
        <button onClick={startGame} style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#f093fb,#f5576c)",border:"none",borderRadius:12,color:"#fff",fontWeight:"bold",fontSize:15,cursor:"pointer",boxShadow:"0 4px 18px rgba(240,147,251,0.35)"}}>ゲームスタート 🎨</button>
      </div>
      <div style={{marginTop:20,background:"rgba(255,255,255,0.03)",borderRadius:12,padding:"14px 18px",maxWidth:420,width:"100%",border:"1px solid rgba(255,255,255,0.06)"}}>
        <p style={{color:"#666",fontSize:12,margin:0,lineHeight:1.8}}>
          📜 手番に「カードを引いて列に置く」か「列を取る」を選択。列を取るとそのラウンドは終了。<br/>
          🌈 ジョーカーは任意の色として使用可。<br/>
          同じ色を集めると得点。4色目以降はマイナス点。<br/>
          🔔 残り15枚に差し掛かると終了カードが現れ、そのラウンドが最終ラウンドになる。
        </p>
        <div style={{marginTop:12,display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:4,textAlign:"center"}}>
          {[1,2,3,4,5,"6+"].map((n,i)=>(
            <div key={i} style={{background:"rgba(255,255,255,0.05)",borderRadius:8,padding:"6px 2px"}}>
              <div style={{color:"#aaa",fontSize:11}}>{n}枚</div>
              <div style={{color:"#f1c40f",fontWeight:"bold",fontSize:14}}>{[1,3,6,10,15,21][i]}</div>
            </div>
          ))}
        </div>
        <p style={{color:"#555",fontSize:11,margin:"8px 0 0",textAlign:"center"}}>上位3色が加点、4色目以降は同じ表で減点</p>
      </div>
    </div>
  );

  if(screen==="game"&&game) {
    const g=game;
    const current=g.players[g.currentPlayer];
    const gameOver=g.phase==="ended";
    const hasPending=!!g.pendingCard;
    const playersDone=g.playersDone||Array(g.players.length).fill(false);
    const currentDone=playersDone[g.currentPlayer];
    const isHumanTurn=!gameOver&&!currentDone&&!current.isCPU;
    const allRowsFull=g.rows.every((r,i)=>g.rowTaken[i]||r.length>=(g.rowMaxCards?.[i]??3));
    const canDraw=isHumanTurn&&g.deck.length>0&&!hasPending&&!allRowsFull;
    const mustTake=isHumanTurn&&!hasPending&&allRowsFull;
    const rowCanPlace=(i)=>isHumanTurn&&hasPending&&!g.rowTaken[i]&&g.rows[i].length<(g.rowMaxCards?.[i]??3);
    const rowCanTake=(i)=>isHumanTurn&&!hasPending&&!g.rowTaken[i]&&g.rows[i].length>0;
    const handleRowClick=(i)=>{ if(hasPending&&rowCanPlace(i)) doPlaceCard(i); else if(rowCanTake(i)) doTakeRow(i); };

    return (
      <div style={{minHeight:"100vh",background:"#0f0f1a",fontFamily:"'Segoe UI',sans-serif",padding:14,maxWidth:680,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <h2 style={{margin:0,fontSize:22,fontWeight:900,background:"linear-gradient(135deg,#f093fb,#4facfe)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>🎨 Coloretto</h2>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{color:"#555",fontSize:12}}>残り {g.deck.length} 枚</span>
            <button onClick={()=>{setGame(null);setScreen("setup");}} style={{background:"rgba(255,255,255,0.07)",border:"none",borderRadius:8,color:"#888",cursor:"pointer",padding:"5px 10px",fontSize:12}}>リセット</button>
          </div>
        </div>
        {g.message&&<div style={{background:"rgba(241,196,15,0.12)",border:"1px solid rgba(241,196,15,0.4)",borderRadius:10,padding:"7px 14px",marginBottom:10,color:"#f1c40f",fontSize:13,textAlign:"center"}}>{g.message}</div>}
        {!gameOver&&(
          <div style={{background:current.isCPU?"rgba(79,172,254,0.1)":"linear-gradient(135deg,rgba(240,147,251,0.12),rgba(79,172,254,0.12))",borderRadius:12,padding:"10px 14px",marginBottom:14,border:`1px solid ${current.isCPU?"rgba(79,172,254,0.3)":"rgba(240,147,251,0.3)"}`,textAlign:"center"}}>
            <span style={{color:"#aaa",fontSize:13}}>現在の手番: </span>
            <span style={{color:current.isCPU?"#4facfe":"#f093fb",fontWeight:"bold",fontSize:15}}>{current.isCPU?"🤖":"👤"} {current.name}</span>
            {current.isCPU&&<span style={{color:"#555",fontSize:12,marginLeft:8}}>思考中…</span>}
          </div>
        )}
        {hasPending&&(
          <div style={{background:"rgba(79,172,254,0.12)",border:"2px solid #4facfe",borderRadius:12,padding:"10px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
            <span style={{color:"#4facfe",fontSize:13,fontWeight:"bold"}}>引いたカード:</span>
            <CardDisplay card={g.pendingCard}/>
            {isHumanTurn&&<span style={{color:"#777",fontSize:12}}>👇 置く列をクリック</span>}
          </div>
        )}
        <div style={{marginBottom:14}}>
          <h3 style={{color:"#444",fontSize:11,margin:"0 0 7px",textTransform:"uppercase",letterSpacing:1}}>列</h3>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {g.rows.map((row,i)=>(
              <RowDisplay key={i} row={row} rowIndex={i} canTake={rowCanTake(i)} canPlace={rowCanPlace(i)} onRowClick={handleRowClick} isActive={!g.rowTaken[i]} maxCards={g.rowMaxCards?.[i]??3}/>
            ))}
          </div>
        </div>
        {!gameOver&&isHumanTurn&&(
          <div style={{display:"flex",gap:8,marginBottom:18}}>
            <button onClick={doDrawCard} disabled={!canDraw} style={{flex:1,padding:"13px",borderRadius:12,border:"none",background:canDraw?"linear-gradient(135deg,#4facfe,#43e97b)":"rgba(255,255,255,0.05)",color:canDraw?"#fff":"#444",fontWeight:"bold",fontSize:14,cursor:canDraw?"pointer":"not-allowed",boxShadow:canDraw?"0 4px 14px rgba(79,172,254,0.35)":"none",transition:"all 0.18s"}}>
              🃏 カードを引く
            </button>
            {mustTake&&<div style={{flex:1,padding:"13px",borderRadius:12,background:"rgba(241,196,15,0.08)",border:"1px solid rgba(241,196,15,0.4)",color:"#f1c40f",fontWeight:"bold",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",textAlign:"center"}}>👆 列をクリックして取る</div>}
          </div>
        )}
        <h3 style={{color:"#444",fontSize:11,margin:"0 0 7px",textTransform:"uppercase",letterSpacing:1}}>プレイヤー</h3>
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {g.players.map((p,i)=>(
            <PlayerPanel key={i} player={p} isCurrent={i===g.currentPlayer&&!gameOver} isDone={!gameOver&&playersDone[i]}/>
          ))}
        </div>
        {gameOver&&(
          <div style={{marginTop:18,textAlign:"center"}}>
            <div style={{background:"linear-gradient(135deg,rgba(240,147,251,0.15),rgba(79,172,254,0.15))",borderRadius:18,padding:22,border:"2px solid rgba(240,147,251,0.35)"}}>
              <div style={{fontSize:36,marginBottom:8}}>🏆</div>
              <h2 style={{color:"#fff",margin:"0 0 14px",fontSize:20}}>ゲーム終了！</h2>
              {[...g.players]
                .map(p=>{const counts=countColors(p.hand);const jokers=countJokers(p.hand);return {...p,score:getScore(counts,jokers)+p.bonus};})
                .sort((a,b)=>b.score-a.score)
                .map((p,rank)=>(
                  <div key={p.name} style={{display:"flex",justifyContent:"space-between",padding:"9px 14px",borderRadius:10,marginBottom:7,background:rank===0?"rgba(241,196,15,0.18)":"rgba(255,255,255,0.04)",border:rank===0?"1px solid #f1c40f":"1px solid transparent"}}>
                    <span style={{color:rank===0?"#f1c40f":"#ccc"}}>{["🥇","🥈","🥉","4️⃣","5️⃣"][rank]} {p.isCPU?"🤖":"👤"} {p.name}</span>
                    <span style={{color:rank===0?"#f1c40f":"#888",fontWeight:"bold"}}>{p.score}点</span>
                  </div>
                ))}
              <button onClick={()=>{setGame(null);setScreen("setup");}} style={{marginTop:14,padding:"11px 26px",background:"linear-gradient(135deg,#f093fb,#f5576c)",border:"none",borderRadius:12,color:"#fff",fontWeight:"bold",fontSize:14,cursor:"pointer"}}>もう一度遊ぶ</button>
            </div>
          </div>
        )}
        <div style={{marginTop:18,background:"rgba(255,255,255,0.03)",borderRadius:12,padding:"12px 14px",border:"1px solid rgba(255,255,255,0.06)"}}>
          <h3 style={{color:"#444",fontSize:11,margin:"0 0 8px",textTransform:"uppercase",letterSpacing:1}}>得点表</h3>
          <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:4,textAlign:"center",marginBottom:6}}>
            {[1,2,3,4,5,"6+"].map((n,i)=>(
              <div key={i} style={{background:"rgba(255,255,255,0.05)",borderRadius:8,padding:"5px 2px"}}>
                <div style={{color:"#555",fontSize:10}}>{n}枚</div>
                <div style={{color:"#f1c40f",fontWeight:"bold",fontSize:13}}>{[1,3,6,10,15,21][i]}</div>
              </div>
            ))}
          </div>
          <p style={{color:"#444",fontSize:10,margin:0,textAlign:"center"}}>上位3色が加点 / 4色目以降は同じ点数で減点</p>
        </div>

        {g.log.length>0&&(
          <div style={{marginTop:14}}>
            <h3 style={{color:"#333",fontSize:11,margin:"0 0 5px",textTransform:"uppercase",letterSpacing:1}}>ログ</h3>
            {g.log.map((l,i)=><div key={i} style={{color:"#444",fontSize:11,marginBottom:2}}>• {l}</div>)}
          </div>
        )}
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
